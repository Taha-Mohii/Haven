<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haven — Sign In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h2>Welcome back</h2>
        <p class="subtitle">Haven is here, whenever you are.</p>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">
            <label>Username
                <input type="text" name="username" required autofocus>
            </label>
            <label>Password
                <input type="password" name="password" required>
            </label>
            <button type="submit" class="btn btn-primary">Come in</button>
        </form>

        <p class="auth-switch">New here? <a href="{{ url_for('register') }}">Create your Haven</a></p>
        <p class="auth-switch"><a href="{{ url_for('forgot_password') }}">Forgot your password?</a></p>
    </div>
</body>
</html>
