<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haven — Forgot Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
  <div class="auth-card">
    <h2>Forgot your password?</h2>
    <p class="subtitle">Enter your username and phone number. We'll send a code to your WhatsApp.</p>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
      <label>Username
        <input type="text" name="username" required autofocus>
      </label>
      <label>Phone number (WhatsApp)
        <input type="text" name="phone" placeholder="+91xxxxxxxxxx" required>
      </label>
      <button type="submit" class="btn btn-primary">Send code</button>
    </form>

    <p class="auth-switch"><a href="{{ url_for('login') }}">← Back to login</a></p>
  </div>
</body>
</html>
