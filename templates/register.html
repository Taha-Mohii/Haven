<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haven — Register</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
  <div class="auth-card">
    <h2>Welcome to Haven</h2>
    <p class="subtitle">Let's set up your safe space.</p>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
      <label>Your name
        <input type="text" name="name" required autofocus>
      </label>
      <label>Age
        <input type="number" name="age" min="1" max="120" required>
      </label>
      <label>Your condition
        <input type="text" name="condition" placeholder="e.g. Stage 3 lung cancer" required>
      </label>
      <label>Username
        <input type="text" name="username" required>
      </label>
      <label>Password
        <input type="password" name="password" required>
      </label>
      <button type="submit" class="btn btn-primary">Create my Haven</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</body>
</html>
